version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-minor:
        update-types: ["minor", "patch"]
  - package-ecosystem: "npm"
    directory: "/sdk/typescript"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      ts-sdk-minor:
        update-types: ["minor", "patch"]
  - package-ecosystem: "npm"
    directory: "/pwa"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      pwa-minor:
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
