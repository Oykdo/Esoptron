repos:
  - repo: local
    hooks:
      - id: utf8-lf-check
        name: UTF-8 + LF encoding check
        entry: python tools/check_encoding.py
        language: system
        types_or: [python, typescript, javascript, json, markdown, yaml, toml]
        pass_filenames: true
        require_serial: true

      - id: spec-manifest-fresh
        name: SPECS.SHA3-256 must verify
        entry: python tools/verify_spec.py --all
        language: system
        pass_filenames: false
        files: ^(docs/(specs|whitepaper_|audit_report_|migration_protocol|testing_guide).*\.md|SPECS\.SHA3-256)$
        require_serial: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'      # markdown uses trailing spaces for line breaks
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ['--maxkb=2048']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']
        files: ^(src|tests|tools|scripts)/.*\.py$

# Install via:
#   pip install pre-commit
#   pre-commit install
#
# Run on the whole repo with:
#   pre-commit run --all-files
